<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoGen Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--purple:#7c5cfc;--purple-light:#9d82fd;--purple-dim:rgba(124,92,252,0.15);--green:#22c98a;--green-dim:rgba(34,201,138,0.15);--red:#fc5c5c;--red-dim:rgba(252,92,92,0.12);--text:#f0f0f5;--text2:#8888a0;--text3:#55556a}
body{font-family:Sora,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}
.header{text-align:center;margin-bottom:2rem}
.logo-icon{width:44px;height:44px;background:var(--purple);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:.8rem}
h1{font-size:26px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px;background:linear-gradient(135deg,#f0f0f5 0%,#8888a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:14px;color:var(--text2)}
.container{width:100%;max-width:540px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.card-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.key-row{display:flex;gap:8px}
input[type=text]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:Sora,monospace;font-size:13px;color:var(--text);outline:none}
input:focus{border-color:var(--purple)}
input::placeholder{color:var(--text3)}
.verify-btn{background:var(--purple);border:none;border-radius:10px;padding:11px 16px;color:#fff;font-family:Sora,sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.credit-badge{display:none;background:var(--purple-dim);border:1px solid rgba(124,92,252,.3);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--purple-light);text-align:center;margin-top:10px}
.upload-zone{border:1.5px dashed var(--border2);border-radius:12px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--purple);background:var(--purple-dim)}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:14px;color:var(--text2);margin-bottom:4px}
.upload-hint{font-size:12px;color:var(--text3)}
.preview-area{display:none;position:relative;text-align:center}
.preview-area img{max-height:200px;max-width:100%;border-radius:10px;border:1px solid var(--border)}
.remove-img{position:absolute;top:6px;right:6px;width:26px;height:26px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.flow-preview{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.flow-step{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;color:var(--text2)}
.flow-step .icon{font-size:20px;display:block;margin-bottom:4px}
.flow-arrow{color:var(--text3);font-size:16px}
.generate-btn{width:100%;padding:15px;background:var(--purple);border:none;border-radius:14px;color:#fff;font-family:Sora,sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.generate-btn:hover:not(:disabled){background:#6a4de8;transform:translateY(-1px)}
.generate-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.progress-wrap{display:none;background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:99px;width:0%;transition:width .6s ease}
.status-box{display:none;border-radius:12px;padding:13px 16px;font-size:14px;line-height:1.5}
.st-info{background:rgba(124,92,252,.12);color:var(--purple-light);border:1px solid rgba(124,92,252,.3)}
.st-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,201,138,.3)}
.st-error{background:var(--red-dim);color:var(--red);border:1px solid rgba(252,92,92,.3)}
.result-video{display:none;width:100%;border-radius:12px;border:1px solid var(--border);background:#000}
.download-btn{display:none;width:100%;padding:13px;background:var(--green-dim);border:1px solid rgba(34,201,138,.3);border-radius:12px;color:var(--green);font-family:Sora,sans-serif;font-size:14px;font-weight:600;cursor:pointer;align-items:center;justify-content:center;gap:8px}
.footer{margin-top:1.5rem;font-size:12px;color:var(--text3);text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="header">
  <div class="logo-icon">&#127916;</div>
  <h1>VideoGen Pro</h1>
  <p class="subtitle">License key diye login koro, photo dao, video pao</p>
</div>
<div class="container">
  <div class="card">
    <div class="card-label">License Key</div>
    <div class="key-row">
      <input type="text" id="licenseKey" placeholder="VGP-XXXX-XXXX-XXXX">
      <button class="verify-btn" id="verifyBtn">Verify</button>
    </div>
    <div class="credit-badge" id="creditBadge"></div>
  </div>
  <div class="card" id="uploadCard" style="display:none">
    <div class="card-label">Client Photo</div>
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <div class="upload-icon">&#9729;</div>
      <div class="upload-text">Click or drag photo here</div>
      <div class="upload-hint">JPG, PNG - clear front face</div>
    </div>
    <div class="preview-area" id="previewArea">
      <img id="previewImg" src="" alt="Preview">
      <button class="remove-img" id="removeBtn">x</button>
    </div>
  </div>
  <div class="card" id="flowCard" style="display:none">
    <div class="card-label">Head Movement</div>
    <div class="flow-preview">
      <div class="flow-step"><span class="icon">&#128072;</span>Left</div>
      <div class="flow-arrow">&#8594;</div>
      <div class="flow-step"><span class="icon">&#128070;</span>Up</div>
      <div class="flow-arrow">&#8594;</div>
      <div class="flow-step"><span class="icon">&#128073;</span>Right</div>
      <div class="flow-arrow">&#8594;</div>
      <div class="flow-step"><span class="icon">&#128071;</span>Down</div>
    </div>
  </div>
  <button class="generate-btn" id="genBtn" style="display:none" disabled>&#9654; Generate Video</button>
  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-box" id="statusBox"></div>
  <video class="result-video" id="resultVideo" controls></video>
  <button class="download-btn" id="downloadBtn">&#11015; Download Video</button>
</div>
<div class="footer">VideoGen Pro &middot; Powered by Ayan Mustafiz</div>

// UI Elements
var licenseKey = document.getElementById('licenseKey');
var verifyBtn = document.getElementById('verifyBtn');
var creditBadge = document.getElementById('creditBadge');
var uploadCard = document.getElementById('uploadCard');
var flowCard = document.getElementById('flowCard');
var genBtn = document.getElementById('genBtn');
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var previewArea = document.getElementById('previewArea');
var previewImg = document.getElementById('previewImg');
var removeBtn = document.getElementById('removeBtn');
var progressWrap = document.getElementById('progressWrap');
var progressBar = document.getElementById('progressBar');
var statusBox = document.getElementById('statusBox');
var resultVideo = document.getElementById('resultVideo');
var downloadBtn = document.getElementById('downloadBtn');

var currentLicense = null;
var imageBase64 = null;

function showStatus(msg, type) {
  statusBox.style.display = 'block';
  statusBox.className = 'status-box st-' + type;
  statusBox.textContent = msg;
}

function setProgress(pct) {
  progressWrap.style.display = 'block';
  progressBar.style.width = pct + '%';
}

// Verify license key from Firebase
verifyBtn.addEventListener('click', async function() {
  var key = licenseKey.value.trim();
  if (!key) return;
  verifyBtn.textContent = 'Checking...';
  verifyBtn.disabled = true;
  try {
    var doc = await db.collection('licenses').doc(key).get();
    if (doc.exists) {
      var data = doc.data();
      if (data.credits > 0) {
        currentLicense = { key: key, credits: data.credits };
        creditBadge.style.display = 'block';
        creditBadge.textContent = '✅ ' + data.credits + ' credits remaining';
        uploadCard.style.display = 'block';
        flowCard.style.display = 'block';
        genBtn.style.display = 'flex';
        showStatus('License verified! Upload a photo to continue.', 'info');
      } else {
        showStatus('❌ No credits remaining on this license.', 'error');
      }
    } else {
      showStatus('❌ Invalid license key.', 'error');
    }
  } catch (e) {
    showStatus('Error checking license: ' + e.message, 'error');
  }
  verifyBtn.textContent = 'Verify';
  verifyBtn.disabled = false;
});

// File upload
dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.style.borderColor = 'var(--purple)'; });
dropZone.addEventListener('dragleave', function() { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  var file = e.dataTransfer.files[0];
  if (file) loadImage(file);
});
fileInput.addEventListener('change', function() {
  if (fileInput.files[0]) loadImage(fileInput.files[0]);
});

function loadImage(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    imageBase64 = e.target.result;
    previewImg.src = imageBase64;
    dropZone.style.display = 'none';
    previewArea.style.display = 'block';
    genBtn.disabled = false;
  };
  reader.readAsDataURL(file);
}

removeBtn.addEventListener('click', function() {
  imageBase64 = null;
  previewImg.src = '';
  dropZone.style.display = 'block';
  previewArea.style.display = 'none';
  genBtn.disabled = true;
  fileInput.value = '';
});

// Generate video - uses proxy, no API key in frontend
genBtn.addEventListener('click', async function() {
  if (!imageBase64 || !currentLicense) return;

  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="spinning">⏳</span> Generating...';
  resultVideo.style.display = 'none';
  downloadBtn.style.display = 'none';
  setProgress(10);
  showStatus('⏳ Starting video generation...', 'info');

  try {
    // POST to proxy - no API key needed here!
    var res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imageBase64,
        video: DRIVER_B64,
      })
    });

    var data = await res.json();

    if (!data.id) {
      throw new Error(data.detail || data.error || 'Failed to start prediction');
    }

    var predictionId = data.id;
    setProgress(30);
    showStatus('⏳ Processing... please wait (30-60 sec)', 'info');

    // Poll for result via proxy GET
    var maxTries = 60;
    var tries = 0;
    while (tries < maxTries) {
      await new Promise(function(r) { setTimeout(r, 3000); });
      tries++;

      var pollRes = await fetch(PROXY_URL + '?id=' + predictionId);
      var pollData = await pollRes.json();

      if (pollData.status === 'succeeded') {
        setProgress(100);
        var videoUrl = Array.isArray(pollData.output) ? pollData.output[0] : pollData.output;
        resultVideo.src = videoUrl;
        resultVideo.style.display = 'block';
        downloadBtn.style.display = 'flex';
        downloadBtn.onclick = function() { window.open(videoUrl, '_blank'); };
        showStatus('✅ Video generated successfully!', 'success');

        // Deduct credit from Firebase
        await db.collection('licenses').doc(currentLicense.key).update({
          credits: firebase.firestore.FieldValue.increment(-1)
        });
        currentLicense.credits--;
        creditBadge.textContent = '✅ ' + currentLicense.credits + ' credits remaining';
        break;
      } else if (pollData.status === 'failed' || pollData.status === 'canceled') {
        throw new Error('Prediction failed: ' + (pollData.error || pollData.status));
      }

      // Update progress
      var pct = Math.min(30 + (tries / maxTries) * 65, 95);
      setProgress(pct);
    }

    if (tries >= maxTries) {
      throw new Error('Timeout - prediction took too long');
    }

  } catch (err) {
    showStatus('❌ ' + err.message, 'error');
    setProgress(0);
    progressWrap.style.display = 'none';
  }

  genBtn.disabled = false;
  genBtn.innerHTML = '&#9654; Generate Video';
});
</script>
